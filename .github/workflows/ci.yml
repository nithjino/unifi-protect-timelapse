name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QT_QPA_PLATFORM: offscreen
      TIMELAPSE_WEB_PASSWORD: validation-only

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - name: Install headless Qt libraries
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes libegl1 libgl1 libxcb-cursor0 libxkbcommon-x11-0

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint Python
        run: uv run ruff check .

      - name: Type-check Python
        run: uv run pyright

      - name: Test Python
        run: uv run pytest -q

      - name: Check browser JavaScript
        run: node --check timelapse/static/app.js

      - name: Check launch script
        run: bash -n start-web.sh

      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Check Dockerfile
        run: docker build --check .

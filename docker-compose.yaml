services:
  timelapse-web:
    build:
      context: .
    container_name: timelapse-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TIMELAPSE_WEB_DATA_DIR: /data
      TIMELAPSE_WEB_OUTPUT_DIR: /data/exports
      TIMELAPSE_WEB_HOST: 0.0.0.0
      TIMELAPSE_WEB_TRUSTED_HOSTS: ${TIMELAPSE_WEB_TRUSTED_HOSTS:?Set TIMELAPSE_WEB_TRUSTED_HOSTS to the server IP or hostname}
      TIMELAPSE_WEB_PORT: 8000
      TIMELAPSE_WEB_USERNAME: ${TIMELAPSE_WEB_USERNAME:-timelapse}
      TIMELAPSE_WEB_PASSWORD: ${TIMELAPSE_WEB_PASSWORD:?Set TIMELAPSE_WEB_PASSWORD in .env before starting Docker}
    ports:
      - "${TIMELAPSE_WEB_BIND_ADDRESS:-0.0.0.0}:${TIMELAPSE_WEB_PORT:-8000}:8000"
    volumes:
      - ./data:/data
    security_opt:
      - no-new-privileges:true
